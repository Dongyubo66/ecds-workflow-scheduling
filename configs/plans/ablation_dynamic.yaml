base_config: configs/dynamic.yaml

experiment:
  name: ablation_dynamic
  scenario: dynamic
  quiet: true
  timeout_s: 1200
  keep_single_run_files: true
  trace: false
  output_dir: results/ablation_dynamic
  aggregate_after_run: false

dataset:
  instances:
    - workflow: montage/chameleon-cloud
      instance: montage-chameleon-2mass-05d-001

matrix:
  schedulers: [ECDS]
  seeds: [1, 2, 3]
  weight_mode: simplex_0.25
  dynamic_T: [100]

  ablations:
    - tag: full

    - tag: no_resched
      reschedule_enabled: false

    - tag: no_brown
      force_w4: 0.0

    - tag: no_cluster
      clustering_method: none

    - tag: no_cluster_no_brown
      clustering_method: none
      force_w4: 0.0